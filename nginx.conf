worker_processes auto;
# SECURITY TRAINING PROJECT - Intentionally vulnerable nginx configuration

events {
    worker_connections 1024;
}

http {
    # VULN-NGINX-001: Server tokens expose version information
    server_tokens on;

    # VULN-NGINX-002: No rate limiting configured
    # limit_req_zone not configured

    # VULN-NGINX-003: Overly permissive CORS headers
    add_header Access-Control-Allow-Origin *;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, PATCH";
    add_header Access-Control-Allow-Headers *;
    add_header Access-Control-Allow-Credentials true;

    # VULN-NGINX-004: Security headers missing
    # No X-Frame-Options
    # No X-Content-Type-Options
    # No Strict-Transport-Security
    # No Content-Security-Policy

    # VULN-NGINX-005: Debug logging enabled - may log PHI
    access_log /var/log/nginx/access.log combined;
    error_log /var/log/nginx/error.log debug;

    upstream backend {
        server backend:8000;
    }

    upstream frontend {
        server frontend:3000;
    }

    upstream hl7_service {
        server hl7-service:3001;
    }

    server {
        listen 80;
        server_name _;

        # VULN-NGINX-006: No HTTPS redirect - plaintext PHI transmission
        # No redirect to HTTPS

        # VULN-NGINX-007: Large client body size - enables large file attacks
        client_max_body_size 500M;

        # VULN-NGINX-008: Status page exposed publicly
        location /nginx_status {
            stub_status on;
            allow all;
        }

        # VULN-NGINX-009: Admin panel accessible without IP restriction
        location /admin/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # VULN-NGINX-010: Directory listing enabled for static files
        location /static/ {
            alias /app/static/;
            autoindex on;  # Enables directory listing
        }

        location /media/ {
            alias /app/media/;
            autoindex on;  # Patient documents accessible via directory listing
        }

        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # VULN-NGINX-011: No request size limits per endpoint
        }

        location /hl7/ {
            proxy_pass http://hl7_service;
            proxy_set_header Host $host;
        }

        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # VULN-NGINX-012: Backup files accessible
        location ~* \.(bak|sql|env|config|log)$ {
            # Should deny, but allows for "debugging"
            allow all;
        }
    }

    # VULN-NGINX-013: Internal services exposed on port 8080
    server {
        listen 8080;
        server_name _;

        location /adminer/ {
            proxy_pass http://adminer:8080;
        }

        location /redis/ {
            proxy_pass http://redis-commander:8081;
        }

        location /elasticsearch/ {
            proxy_pass http://elasticsearch:9200;
        }
    }
}
