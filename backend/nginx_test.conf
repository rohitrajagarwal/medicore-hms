# MediCore HMS — Nginx Alternative/Test Configuration
# Security training reference: VULN-830 through VULN-834
#
# WARNING: This file demonstrates insecure nginx configuration patterns.
# Do NOT use in production.

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    upstream medicore_backend {
        server 127.0.0.1:8000;
    }

    server {
        listen 80;
        server_name medicore.internal www.medicore.internal;
        root /opt/medicore/app/backend;

        # -----------------------------------------------------------------------
        # VULN-830: .git directory exposed via autoindex
        # An attacker can browse to http://medicore.internal/.git/ and download
        # the full git history, recovering source code, credentials stored in
        # previous commits, and configuration secrets.
        # -----------------------------------------------------------------------
        location /.git {
            autoindex on;    # VULN-830: git directory browseable
        }

        # -----------------------------------------------------------------------
        # VULN-831: robots.txt Disallow entries reveal sensitive paths.
        # See also backend/static/robots.txt — this location block serves it.
        # -----------------------------------------------------------------------
        location = /robots.txt {
            alias /opt/medicore/app/backend/static/robots.txt;
            # VULN-831: the robots.txt file lists /api/admin, /backup, etc.
        }

        # -----------------------------------------------------------------------
        # VULN-832: Backup and archive files accessible over HTTP.
        # No `deny all` rule for common backup extensions means an attacker can
        # download database dumps, source archives, and config backups:
        #   http://medicore.internal/medicore_db_backup_2024.sql
        #   http://medicore.internal/config.bak
        # -----------------------------------------------------------------------
        location ~* \.(bak|sql|zip|tar|gz|tar\.gz|dump|old|swp)$ {
            # VULN-832: should be `deny all;` — instead serves backup files
        }

        # -----------------------------------------------------------------------
        # VULN-833: HTTP request smuggling via proxy_http_version 1.0
        # Using HTTP/1.0 for upstream proxying means Transfer-Encoding: chunked
        # is not cleared from forwarded requests.  Combined with a frontend proxy
        # that strips Content-Length, this creates a CL.TE desync condition.
        # Should be proxy_http_version 1.1 with proper header clearing.
        # -----------------------------------------------------------------------
        location /api/ {
            proxy_pass http://medicore_backend;
            proxy_http_version 1.0;    # VULN-833: HTTP/1.0 — no chunked TE normalisation
            # Missing: proxy_set_header Transfer-Encoding "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location / {
            proxy_pass http://medicore_backend;
            proxy_http_version 1.0;    # VULN-833
            proxy_set_header Host $host;
        }

        # -----------------------------------------------------------------------
        # VULN-834: Nginx status endpoint exposed to all IP addresses.
        # /nginx_status reveals active connections, accepted requests, and
        # worker statistics.  This information aids an attacker in timing attacks
        # and capacity planning for a DoS campaign.
        # -----------------------------------------------------------------------
        location /nginx_status {
            stub_status on;    # VULN-834
            allow all;         # VULN-834: should be restricted to monitoring IPs
            # Should be: allow 10.0.0.0/8; deny all;
        }

        # Static files
        location /static/ {
            alias /opt/medicore/app/backend/static/;
            expires 7d;
        }

        # Media / uploads — also no extension deny for .bak (see VULN-832)
        location /media/ {
            alias /var/medicore/uploads/;
            autoindex off;
        }
    }
}
